<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reelr — Stop the Scroll. Every Time.</title>
<meta name="description" content="Reelr generates magnetic social media hooks, captions and hashtags from your photo description — instantly. Stop the scroll, spark comments, and say what no one else will.">
<meta property="og:title" content="Reelr — Stop the Scroll. Every Time.">
<meta property="og:description" content="Describe your photo. Pick your vibe. Get hooks, a full caption and hashtags in seconds. Free, no sign-up.">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Reelr — Stop the Scroll. Every Time.">
<meta name="twitter:description" content="Describe your photo. Pick your vibe. Get scroll-stopping hooks in seconds.">
<meta name="theme-color" content="#0A0A0F">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0A0A0F; --surface: #111118; --surface2: #18181f;
  --border: rgba(255,255,255,0.07); --border-glow: rgba(120,80,255,0.35);
  --text: #F0EEF8; --muted: #6B6880;
  --accent: #8B5CF6; --accent2: #06D6A0; --accent3: #FF6B9D; --neon: #A78BFA;
}
html { scroll-behavior: smooth; }
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }
body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse 80% 50% at 20% -10%, rgba(139,92,246,0.12) 0%, transparent 60%), radial-gradient(ellipse 60% 40% at 80% 110%, rgba(6,214,160,0.07) 0%, transparent 60%); pointer-events: none; z-index: 0; }
.container { max-width: 560px; margin: 0 auto; padding: 32px 20px 60px; position: relative; z-index: 1; }

/* Header */
.header { text-align: center; margin-bottom: 28px; animation: fadeDown 0.6s ease both; }
.logo-lockup { display: inline-flex; align-items: center; gap: 12px; margin-bottom: 18px; }
.logo-icon { filter: drop-shadow(0 0 12px rgba(139,92,246,0.45)); flex-shrink: 0; }
.logo-wordmark { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; letter-spacing: -0.03em; background: linear-gradient(135deg, #A78BFA 0%, #06D6A0 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
h1 { font-family: 'Syne', sans-serif; font-size: clamp(26px, 6vw, 46px); font-weight: 700; line-height: 1.1; letter-spacing: -0.01em; background: linear-gradient(135deg, #F0EEF8 0%, #A78BFA 50%, #06D6A0 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 8px; }
.tagline { font-size: 13px; color: var(--muted); line-height: 1.6; }

/* Section tabs */
.section-tabs { display: flex; gap: 4px; margin-bottom: 18px; background: var(--surface2); border-radius: 12px; padding: 4px; }
.section-tab { flex: 1; padding: 10px; border: none; background: transparent; color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; border-radius: 9px; transition: all 0.18s; -webkit-tap-highlight-color: transparent; }
.section-tab.active { background: var(--surface); color: var(--text); box-shadow: 0 1px 6px rgba(0,0,0,0.3); }

/* Platform tabs */
.platform-tabs { display: flex; gap: 6px; margin-bottom: 14px; }
.platform-tab { flex: 1; padding: 9px 4px; background: var(--surface2); border: 1.5px solid var(--border); border-radius: 10px; color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 600; cursor: pointer; text-align: center; transition: all 0.18s; -webkit-tap-highlight-color: transparent; display: flex; flex-direction: column; align-items: center; gap: 3px; }
.platform-tab .pt-icon { font-size: 15px; }
.platform-tab:hover { border-color: rgba(255,255,255,0.15); color: var(--text); }
.platform-tab.active { border-color: var(--border-glow); background: rgba(139,92,246,0.1); color: var(--neon); box-shadow: 0 0 0 1px rgba(139,92,246,0.2); }

/* Card */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 18px; margin-bottom: 12px; animation: fadeUp 0.5s ease both; }
.card-label { font-size: 10px; font-weight: 700; letter-spacing: 0.14em; color: var(--muted); text-transform: uppercase; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
.card-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

textarea { width: 100%; background: var(--surface2); border: 1.5px solid var(--border); border-radius: 11px; padding: 13px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; line-height: 1.6; resize: none; min-height: 110px; outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
textarea::placeholder { color: var(--muted); }
textarea:focus { border-color: rgba(139,92,246,0.5); box-shadow: 0 0 0 3px rgba(139,92,246,0.1); }
.char-count { text-align: right; font-size: 11px; color: var(--muted); margin-top: 5px; }

/* Vibe pills */
.vibe-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
.vibe-pill { display: flex; align-items: center; gap: 8px; padding: 9px 11px; background: var(--surface2); border: 1.5px solid var(--border); border-radius: 10px; cursor: pointer; transition: all 0.18s ease; user-select: none; -webkit-tap-highlight-color: transparent; }
.vibe-pill:hover { border-color: rgba(255,255,255,0.15); }
.vibe-pill.active { border-color: var(--border-glow); background: rgba(139,92,246,0.1); box-shadow: 0 0 0 1px rgba(139,92,246,0.2); }
.vibe-pill input[type="checkbox"] { display: none; }
.vibe-icon { font-size: 15px; flex-shrink: 0; }
.vibe-info { flex: 1; min-width: 0; }
.vibe-name { font-size: 12px; font-weight: 600; color: var(--text); display: block; }
.vibe-desc { font-size: 10px; color: var(--muted); }
.vibe-check { width: 15px; height: 15px; border: 1.5px solid var(--border); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 9px; transition: all 0.15s; flex-shrink: 0; }
.vibe-pill.active .vibe-check { background: var(--accent); border-color: var(--accent); color: #fff; }

/* Generate button */
.btn-generate { width: 100%; padding: 16px; background: linear-gradient(135deg, #7C3AED, #8B5CF6, #6D28D9); border: none; border-radius: 13px; color: #fff; font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; letter-spacing: 0.02em; cursor: pointer; position: relative; overflow: hidden; transition: transform 0.15s, box-shadow 0.15s; box-shadow: 0 4px 24px rgba(139,92,246,0.35); margin-bottom: 12px; -webkit-tap-highlight-color: transparent; }
.btn-generate:hover { transform: translateY(-1px); box-shadow: 0 8px 32px rgba(139,92,246,0.45); }
.btn-generate:active { transform: translateY(0); }
.btn-generate:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
.btn-generate::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, transparent 0%, rgba(255,255,255,0.08) 50%, transparent 100%); }
.btn-text { position: relative; z-index: 1; display: flex; align-items: center; justify-content: center; gap: 10px; }
.dots { display: inline-flex; gap: 4px; }
.dots span { width: 5px; height: 5px; background: #fff; border-radius: 50%; animation: bounce 1s ease infinite; }
.dots span:nth-child(2) { animation-delay: 0.15s; } .dots span:nth-child(3) { animation-delay: 0.3s; }

/* Output */
.output-section { display: none; }
.output-section.visible { display: block; animation: fadeUp 0.4s ease both; }
.output-header { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }

.platform-bar { display: flex; align-items: center; gap: 6px; margin-bottom: 12px; padding: 8px 12px; background: var(--surface2); border-radius: 9px; border: 1px solid var(--border); font-size: 11px; color: var(--muted); }
.platform-bar .pname { color: var(--neon); font-weight: 600; }

/* Hook cards */
.hook-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 8px; position: relative; animation: hookIn 0.35s ease both; }
.hook-card:nth-child(2) { animation-delay: 0.07s; } .hook-card:nth-child(3) { animation-delay: 0.14s; }
.hook-card:hover { border-color: rgba(255,255,255,0.11); }
.hook-type { font-size: 9px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 7px; display: flex; align-items: center; gap: 5px; }
.hook-type .dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.type-scroll .dot { background: var(--accent); } .type-question .dot { background: var(--accent2); } .type-contrast .dot { background: var(--accent3); }
.type-scroll { color: var(--neon); } .type-question { color: var(--accent2); } .type-contrast { color: var(--accent3); }
.hook-text { font-size: 14px; line-height: 1.6; color: var(--text); padding-right: 52px; }
.copy-btn { position: absolute; top: 12px; right: 12px; background: rgba(255,255,255,0.06); border: 1px solid var(--border); border-radius: 6px; padding: 5px 9px; font-size: 11px; font-weight: 600; color: var(--muted); cursor: pointer; transition: all 0.18s; -webkit-tap-highlight-color: transparent; }
.copy-btn:hover { background: rgba(255,255,255,0.1); color: var(--text); }
.copy-btn.copied { background: rgba(6,214,160,0.12); border-color: rgba(6,214,160,0.3); color: var(--accent2); }

/* Caption */
.caption-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 8px; animation: hookIn 0.35s 0.22s ease both; }
.caption-text { font-size: 13px; line-height: 1.75; color: var(--text); white-space: pre-wrap; }
.action-row { display: flex; gap: 7px; margin-top: 11px; }
.btn-small { flex: 1; padding: 9px 6px; background: transparent; border: 1.5px solid var(--border); border-radius: 9px; color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.18s; -webkit-tap-highlight-color: transparent; text-align: center; }
.btn-small:hover { border-color: rgba(255,255,255,0.18); color: var(--text); }

/* Hashtags */
.hashtag-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 8px; animation: hookIn 0.35s 0.3s ease both; }
.tag-wrap { display: flex; flex-wrap: wrap; gap: 7px; }
.tag-pill { display: inline-block; padding: 5px 10px; background: rgba(139,92,246,0.1); border: 1px solid rgba(139,92,246,0.22); border-radius: 100px; font-size: 12px; color: var(--neon); cursor: pointer; transition: all 0.15s; -webkit-tap-highlight-color: transparent; }
.tag-pill:hover { background: rgba(139,92,246,0.2); }
.tag-pill.tag-copied { background: rgba(6,214,160,0.12); border-color: rgba(6,214,160,0.3); color: var(--accent2); }

/* Regen */
.regen-row { display: flex; gap: 8px; margin: 4px 0 22px; }
.btn-regen { flex: 1; padding: 12px; background: transparent; border: 1.5px solid var(--border); border-radius: 11px; color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.18s; -webkit-tap-highlight-color: transparent; }
.btn-regen:hover { border-color: rgba(255,255,255,0.18); color: var(--text); }

/* History */
.history-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.history-title { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; }
.btn-clear { font-size: 11px; color: var(--muted); background: none; border: none; cursor: pointer; -webkit-tap-highlight-color: transparent; }
.btn-clear:hover { color: var(--accent3); }
.history-empty { text-align: center; padding: 32px 20px; font-size: 13px; color: var(--muted); line-height: 1.7; }
.history-item { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 13px; margin-bottom: 8px; cursor: pointer; transition: border-color 0.15s; }
.history-item:hover { border-color: rgba(255,255,255,0.13); }
.history-meta { display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px; }
.history-platform { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--neon); }
.history-time { font-size: 10px; color: var(--muted); }
.history-preview { font-size: 12px; color: var(--muted); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.history-tap { font-size: 10px; color: rgba(139,92,246,0.5); margin-top: 4px; }

/* Toast */
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--surface); border: 1px solid var(--border); border-radius: 100px; padding: 9px 18px; font-size: 13px; color: var(--accent2); box-shadow: 0 8px 32px rgba(0,0,0,0.4); opacity: 0; transition: opacity 0.25s; white-space: nowrap; z-index: 100; pointer-events: none; }
.toast.show { opacity: 1; }

@keyframes fadeDown { from { opacity: 0; transform: translateY(-16px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
@keyframes bounce { 0%,80%,100% { transform: translateY(0); } 40% { transform: translateY(-6px); } }
@keyframes hookIn { from { opacity: 0; transform: translateX(-7px); } to { opacity: 1; transform: translateX(0); } }

@media (max-width: 400px) {
  .vibe-grid { grid-template-columns: 1fr; }
  .container { padding: 20px 14px 50px; }
  h1 { font-size: 24px; }
  .logo-wordmark { font-size: 24px; }
  .platform-tab { font-size: 10px; }
}
</style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="logo-lockup">
      <svg class="logo-icon" width="42" height="42" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="rg1" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#A78BFA"/><stop offset="100%" stop-color="#06D6A0"/></linearGradient>
          <linearGradient id="rg2" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#7C3AED"/><stop offset="100%" stop-color="#059669"/></linearGradient>
          <filter id="glow"><feGaussianBlur stdDeviation="1.5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        </defs>
        <circle cx="24" cy="24" r="21" stroke="url(#rg1)" stroke-width="2" fill="none" opacity="0.6"/>
        <circle cx="24" cy="24" r="6" fill="url(#rg1)" opacity="0.9"/>
        <circle cx="24" cy="8" r="3" fill="url(#rg1)" filter="url(#glow)"/>
        <circle cx="24" cy="40" r="3" fill="url(#rg1)" filter="url(#glow)"/>
        <circle cx="8" cy="24" r="3" fill="url(#rg1)" filter="url(#glow)"/>
        <circle cx="40" cy="24" r="3" fill="url(#rg1)" filter="url(#glow)"/>
        <circle cx="12.7" cy="12.7" r="3" fill="url(#rg2)" opacity="0.7"/>
        <circle cx="35.3" cy="35.3" r="3" fill="url(#rg2)" opacity="0.7"/>
        <circle cx="35.3" cy="12.7" r="3" fill="url(#rg2)" opacity="0.7"/>
        <circle cx="12.7" cy="35.3" r="3" fill="url(#rg2)" opacity="0.7"/>
        <path d="M21 20.5 L28.5 24 L21 27.5 Z" fill="#fff" opacity="0.95"/>
      </svg>
      <span class="logo-wordmark">Reelr</span>
    </div>
    <h1>Stop the Scroll.<br>Every Time.</h1>
    <p class="tagline">Describe your photo. Pick your vibe.<br>Get hooks, caption &amp; hashtags — instantly.</p>
  </div>

  <!-- Section tabs -->
  <div class="section-tabs">
    <button class="section-tab active" id="tabGenerate" onclick="switchTab('generate')">✦ Generate</button>
    <button class="section-tab" id="tabHistory" onclick="switchTab('history')">🕐 History</button>
  </div>

  <!-- GENERATE PANEL -->
  <div id="panelGenerate">

    <!-- Platform -->
    <div class="platform-tabs">
      <button class="platform-tab active" data-platform="instagram" onclick="selectPlatform(this)"><span class="pt-icon">📸</span>Instagram</button>
      <button class="platform-tab" data-platform="tiktok" onclick="selectPlatform(this)"><span class="pt-icon">🎵</span>TikTok</button>
      <button class="platform-tab" data-platform="linkedin" onclick="selectPlatform(this)"><span class="pt-icon">💼</span>LinkedIn</button>
      <button class="platform-tab" data-platform="twitter" onclick="selectPlatform(this)"><span class="pt-icon">𝕏</span>Twitter</button>
    </div>

    <!-- Description -->
    <div class="card">
      <div class="card-label">Describe Your Photo</div>
      <textarea id="photoDesc" placeholder="e.g. Me holding a coffee at 6am before my gym session, the lighting is golden, I look exhausted but determined..." maxlength="400" oninput="updateChar()"></textarea>
      <div class="char-count"><span id="charCount">0</span>/400</div>
    </div>

    <!-- Vibes -->
    <div class="card">
      <div class="card-label">Tune the Vibe</div>
      <div class="vibe-grid">
        <label class="vibe-pill"><input type="checkbox" value="professional" onchange="togglePill(this)"><span class="vibe-icon">💼</span><span class="vibe-info"><span class="vibe-name">Professional</span><span class="vibe-desc">Thought-leader</span></span><span class="vibe-check">✓</span></label>
        <label class="vibe-pill"><input type="checkbox" value="controversial" onchange="togglePill(this)"><span class="vibe-icon">🔥</span><span class="vibe-info"><span class="vibe-name">Hot Take</span><span class="vibe-desc">Bold & controversial</span></span><span class="vibe-check">✓</span></label>
        <label class="vibe-pill"><input type="checkbox" value="humorous" onchange="togglePill(this)"><span class="vibe-icon">😈</span><span class="vibe-info"><span class="vibe-name">Gremlin Mode</span><span class="vibe-desc">Chaotic & funny</span></span><span class="vibe-check">✓</span></label>
        <label class="vibe-pill"><input type="checkbox" value="vulnerable" onchange="togglePill(this)"><span class="vibe-icon">🫂</span><span class="vibe-info"><span class="vibe-name">Vulnerable</span><span class="vibe-desc">Raw & emotional</span></span><span class="vibe-check">✓</span></label>
        <label class="vibe-pill"><input type="checkbox" value="inspirational" onchange="togglePill(this)"><span class="vibe-icon">✨</span><span class="vibe-info"><span class="vibe-name">Inspirational</span><span class="vibe-desc">Uplifting & motivating</span></span><span class="vibe-check">✓</span></label>
        <label class="vibe-pill"><input type="checkbox" value="genz" onchange="togglePill(this)"><span class="vibe-icon">💀</span><span class="vibe-info"><span class="vibe-name">Gen Z</span><span class="vibe-desc">No cap, bestie</span></span><span class="vibe-check">✓</span></label>
        <label class="vibe-pill"><input type="checkbox" value="corporate" onchange="togglePill(this)"><span class="vibe-icon">📊</span><span class="vibe-info"><span class="vibe-name">Corp Satire</span><span class="vibe-desc">LinkedIn unhinged</span></span><span class="vibe-check">✓</span></label>
        <label class="vibe-pill"><input type="checkbox" value="poetic" onchange="togglePill(this)"><span class="vibe-icon">🌙</span><span class="vibe-info"><span class="vibe-name">Poetic</span><span class="vibe-desc">Soft & lyrical</span></span><span class="vibe-check">✓</span></label>
      </div>
    </div>

    <button class="btn-generate" id="generateBtn" onclick="generateHooks()">
      <span class="btn-text" id="btnText">⏺ Generate My Hooks</span>
    </button>

    <!-- Output -->
    <div class="output-section" id="outputSection">

      <div class="platform-bar">
        <span>Optimised for <span class="pname" id="platformLabel">Instagram</span></span>
        <span id="platformNote" style="margin-left:2px"></span>
      </div>

      <div class="output-header"><span style="color:var(--neon)">✦</span> Your Hooks</div>
      <div class="hook-card"><div class="hook-type type-scroll"><span class="dot"></span>Stop the Scroll</div><div class="hook-text" id="hook1"></div><button class="copy-btn" onclick="copyEl(this,'hook1')">Copy</button></div>
      <div class="hook-card"><div class="hook-type type-question"><span class="dot"></span>Comment Bait</div><div class="hook-text" id="hook2"></div><button class="copy-btn" onclick="copyEl(this,'hook2')">Copy</button></div>
      <div class="hook-card"><div class="hook-type type-contrast"><span class="dot"></span>The Contrarian</div><div class="hook-text" id="hook3"></div><button class="copy-btn" onclick="copyEl(this,'hook3')">Copy</button></div>

      <div class="output-header" style="margin-top:16px"><span style="color:var(--accent3)">✦</span> Full Caption</div>
      <div class="caption-card">
        <div class="caption-text" id="captionText"></div>
        <div class="action-row">
          <button class="btn-small" onclick="copyCaption()">📋 Copy Caption</button>
          <button class="btn-small" onclick="copyAll()">📦 Copy Everything</button>
        </div>
      </div>

      <div class="output-header" style="margin-top:16px"><span style="color:var(--accent)">✦</span> Hashtags <span style="font-size:11px;font-weight:400;color:var(--muted);font-family:'DM Sans',sans-serif">(tap to copy)</span></div>
      <div class="hashtag-card">
        <div class="tag-wrap" id="tagWrap"></div>
        <div class="action-row" style="margin-top:11px">
          <button class="btn-small" onclick="copyTags()">📋 Copy All Hashtags</button>
        </div>
      </div>

      <div class="regen-row"><button class="btn-regen" onclick="generateHooks()">↺ Regenerate</button></div>
    </div>
  </div>

  <!-- HISTORY PANEL -->
  <div id="panelHistory" style="display:none">
    <div class="history-header">
      <span class="history-title">Recent Generations</span>
      <button class="btn-clear" onclick="clearHistory()">Clear all</button>
    </div>
    <div id="historyList"></div>
  </div>

</div>
<div class="toast" id="toast"></div>

<script>
// ── Platform config ──────────────────────────────────────────────────────────
const PLATFORMS = {
  instagram: { label:'Instagram', note:'· First 125 chars shown before "more"' },
  tiktok:    { label:'TikTok',    note:'· Keep hook under 100 chars' },
  linkedin:  { label:'LinkedIn',  note:'· First 210 chars before "see more"' },
  twitter:   { label:'Twitter/X', note:'· 280 char limit — hooks only' }
};

// ── State ────────────────────────────────────────────────────────────────────
let sessionHistory = JSON.parse(localStorage.getItem('reelr_v2') || '[]');
let lastResult = null;

// ── Helpers ──────────────────────────────────────────────────────────────────
function updateChar() { document.getElementById('charCount').textContent = document.getElementById('photoDesc').value.length; }
function togglePill(cb) { cb.closest('.vibe-pill').classList.toggle('active', cb.checked); }
function getVibes() { return Array.from(document.querySelectorAll('.vibe-pill input:checked')).map(c => c.value); }
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function switchTab(tab) {
  ['generate','history'].forEach(t => {
    document.getElementById('tab'+t.charAt(0).toUpperCase()+t.slice(1)).classList.toggle('active', t===tab);
    document.getElementById('panel'+t.charAt(0).toUpperCase()+t.slice(1)).style.display = t===tab ? '' : 'none';
  });
  if (tab==='history') renderHistory();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function detectKw(text) {
  const t = text.toLowerCase();
  // Whole-word match only — prevents 'eat' matching inside 'great', 'eat' in 'repeat', etc.
  const word = (w) => new RegExp('\\b' + w + '\\b').test(t);
  const primary = ['coffee','gym','beach','travel','food','sunset','work'];
  for (const k of primary) if (word(k)) return k;
  const aliases = {
    morning:'coffee', espresso:'coffee', latte:'coffee', matcha:'coffee',
    workout:'gym', fitness:'gym', weights:'gym', training:'gym', running:'gym',
    ocean:'beach', sea:'beach', coast:'beach', sand:'beach', waves:'beach',
    eating:'food', restaurant:'food', dinner:'food', lunch:'food', brunch:'food', meal:'food', cook:'food',
    sky:'sunset', dusk:'sunset', twilight:'sunset',
    office:'work', project:'work', desk:'work', laptop:'work', meeting:'work', startup:'work',
    explore:'travel', adventure:'travel', trip:'travel', hiking:'travel', zipline:'travel', canyon:'travel', mountain:'travel', forest:'travel', jungle:'travel'
  };
  for (const [a,k] of Object.entries(aliases)) if (word(a)) return k;
  return 'default';
}

function buildHook(base, vibes) {
  if (!vibes.length) return base;
  const v = pick(vibes);
  const p = pick(VIBE_PREFIX[v]);
  return p + ' ' + base.charAt(0).toLowerCase() + base.slice(1);
}

function buildCaption(kw, vibes) {
  const d = DB[kw] || DB.default;
  let cap = pick(d.caption);
  if (vibes.length) { const v = pick(vibes); if (VIBE_SUFFIX[v]) cap += VIBE_SUFFIX[v]; }
  if (currentPlatform === 'twitter' && cap.length > 250) cap = cap.split('\n\n')[0];
  return cap;
}

function buildTags(kw) {
  const base = [...(DB[kw]||DB.default).tags];
  const extra = PLATFORM_EXTRA_TAGS[currentPlatform] || [];
  const all = [...new Set([...base,...extra])];
  return all.slice(0, currentPlatform==='linkedin'||currentPlatform==='twitter' ? 5 : 12);
}

function renderTagPills(tags) {
  const wrap = document.getElementById('tagWrap');
  wrap.innerHTML = '';
  tags.forEach(tag => {
    const el = document.createElement('span');
    el.className = 'tag-pill'; el.textContent = tag;
    el.onclick = () => navigator.clipboard.writeText(tag).then(() => { el.classList.add('tag-copied'); setTimeout(() => el.classList.remove('tag-copied'), 1400); showToast('Tag copied ✓'); });
    wrap.appendChild(el);
  });
}

// ── Generate ─────────────────────────────────────────────────────────────────
async function generateHooks() {
  const desc = document.getElementById('photoDesc').value.trim();
  if (!desc) {
    const ta = document.getElementById('photoDesc');
    ta.focus(); ta.style.borderColor = 'rgba(255,100,100,0.5)';
    setTimeout(() => ta.style.borderColor = '', 1500); return;
  }
  const btn = document.getElementById('generateBtn'), btnText = document.getElementById('btnText');
  btn.disabled = true;
  btnText.innerHTML = `<span>Analyzing the Vibe</span><span class="dots"><span></span><span></span><span></span></span>`;

  const vibes = getVibes(), kw = detectKw(desc), d = DB[kw]||DB.default;
  await new Promise(r => setTimeout(r, 1200));

  const h1 = buildHook(pick(d.scroll), vibes);
  const h2 = buildHook(pick(d.question), vibes);
  const h3 = buildHook(pick(d.contrast), vibes);
  const caption = buildCaption(kw, vibes);
  const tags = buildTags(kw);

  document.getElementById('hook1').textContent = h1;
  document.getElementById('hook2').textContent = h2;
  document.getElementById('hook3').textContent = h3;
  document.getElementById('captionText').textContent = caption;
  renderTagPills(tags);

  const p = PLATFORMS[currentPlatform];
  document.getElementById('platformLabel').textContent = p.label;
  document.getElementById('platformNote').textContent = p.note;

  document.querySelectorAll('.copy-btn').forEach(b => { b.textContent = 'Copy'; b.classList.remove('copied'); });

  lastResult = { h1,h2,h3,caption,tags,desc,platform:currentPlatform,vibes,ts:Date.now() };
  sessionHistory.unshift(lastResult);
  if (sessionHistory.length > 20) sessionHistory = sessionHistory.slice(0,20);
  localStorage.setItem('reelr_v2', JSON.stringify(sessionHistory));

  const out = document.getElementById('outputSection');
  out.classList.remove('visible'); void out.offsetWidth; out.classList.add('visible');
  btn.disabled = false; btnText.innerHTML = '⏺ Generate My Hooks';
  setTimeout(() => out.scrollIntoView({ behavior:'smooth', block:'start' }), 100);
}

// ── Copy ─────────────────────────────────────────────────────────────────────
function copyEl(btn, id) {
  navigator.clipboard.writeText(document.getElementById(id).textContent).then(() => {
    btn.textContent='Copied!'; btn.classList.add('copied'); showToast('Copied ✓');
    setTimeout(() => { btn.textContent='Copy'; btn.classList.remove('copied'); }, 2200);
  });
}
function copyCaption() { if(lastResult) navigator.clipboard.writeText(lastResult.caption).then(() => showToast('Caption copied ✓')); }
function copyTags() { if(lastResult) navigator.clipboard.writeText(lastResult.tags.join(' ')).then(() => showToast('Hashtags copied ✓')); }
function copyAll() {
  if(!lastResult) return;
  navigator.clipboard.writeText(`${lastResult.h1}\n\n${lastResult.caption}\n\n${lastResult.tags.join(' ')}`).then(() => showToast('Everything copied ✓'));
}

// ── History ──────────────────────────────────────────────────────────────────
function timeAgo(ts) {
  const m = Math.floor((Date.now()-ts)/60000);
  if(m<1) return 'just now'; if(m<60) return m+'m ago';
  const h = Math.floor(m/60); if(h<24) return h+'h ago';
  return Math.floor(h/24)+'d ago';
}

function renderHistory() {
  const list = document.getElementById('historyList');
  if (!sessionHistory.length) { list.innerHTML='<div class="history-empty">No generations yet.<br>Create your first hooks above! ✦</div>'; return; }
  list.innerHTML = sessionHistory.map((e,i) => `
    <div class="history-item" onclick="loadHistory(${i})">
      <div class="history-meta"><span class="history-platform">${PLATFORMS[e.platform]?.label||e.platform}</span><span class="history-time">${timeAgo(e.ts)}</span></div>
      <div class="history-preview">"${e.desc}"</div>
      <div class="history-tap">↩ Tap to restore</div>
    </div>`).join('');
}

function loadHistory(i) {
  const e = sessionHistory[i];
  document.getElementById('photoDesc').value = e.desc; updateChar();
  document.querySelectorAll('.platform-tab').forEach(t => t.classList.toggle('active', t.dataset.platform===e.platform));
  currentPlatform = e.platform;
  document.querySelectorAll('.vibe-pill input').forEach(cb => { cb.checked=e.vibes?.includes(cb.value)||false; cb.closest('.vibe-pill').classList.toggle('active',cb.checked); });
  document.getElementById('hook1').textContent=e.h1;
  document.getElementById('hook2').textContent=e.h2;
  document.getElementById('hook3').textContent=e.h3;
  document.getElementById('captionText').textContent=e.caption;
  renderTagPills(e.tags||[]);
  const p=PLATFORMS[e.platform]; document.getElementById('platformLabel').textContent=p.label; document.getElementById('platformNote').textContent=p.note;
  lastResult=e;
  document.getElementById('outputSection').classList.add('visible');
  switchTab('generate');
  setTimeout(() => document.getElementById('outputSection').scrollIntoView({behavior:'smooth',block:'start'}),100);
  showToast('Generation restored ✓');
}

function clearHistory() {
  sessionHistory=[]; localStorage.removeItem('reelr_v2'); renderHistory();
}

document.addEventListener('keydown', e => { if((e.metaKey||e.ctrlKey)&&e.key==='Enter') generateHooks(); });
</script>
