<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0A0A0F;
    --surface: #111118;
    --surface2: #18181f;
    --border: rgba(255,255,255,0.07);
    --border-glow: rgba(120,80,255,0.35);
    --text: #F0EEF8;
    --muted: #6B6880;
    --accent: #8B5CF6;
    --accent2: #06D6A0;
    --accent3: #FF6B9D;
    --neon: #A78BFA;
    --neon-glow: 0 0 20px rgba(139,92,246,0.4), 0 0 60px rgba(139,92,246,0.15);
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background texture */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 20% -10%, rgba(139,92,246,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 110%, rgba(6,214,160,0.07) 0%, transparent 60%);
    pointer-events: none; z-index: 0;
  }

  .container {
    max-width: 560px;
    margin: 0 auto;
    padding: 32px 20px 60px;
    position: relative; z-index: 1;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 40px;
    animation: fadeDown 0.6s ease both;
  }

  .logo-lockup {
    display: inline-flex; align-items: center; gap: 12px;
    margin-bottom: 24px;
  }
  .logo-icon {
    filter: drop-shadow(0 0 12px rgba(139,92,246,0.45));
    flex-shrink: 0;
  }
  .logo-wordmark {
    font-family: 'Syne', sans-serif;
    font-size: 28px; font-weight: 800;
    letter-spacing: -0.03em;
    background: linear-gradient(135deg, #A78BFA 0%, #06D6A0 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(32px, 8vw, 52px);
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, #F0EEF8 0%, #A78BFA 50%, #06D6A0 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 12px;
  }

  .tagline {
    font-size: 14px; color: var(--muted); line-height: 1.6;
  }

  /* Card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 24px;
    margin-bottom: 16px;
    animation: fadeUp 0.5s ease both;
  }
  .card:nth-child(2) { animation-delay: 0.1s; }
  .card:nth-child(3) { animation-delay: 0.2s; }

  .card-label {
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.14em; color: var(--muted);
    text-transform: uppercase; margin-bottom: 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .card-label::after {
    content: ''; flex: 1; height: 1px;
    background: var(--border);
  }

  textarea {
    width: 100%;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    line-height: 1.6;
    resize: none;
    min-height: 130px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  textarea::placeholder { color: var(--muted); }
  textarea:focus {
    border-color: rgba(139,92,246,0.5);
    box-shadow: 0 0 0 3px rgba(139,92,246,0.1);
  }

  .char-count {
    text-align: right; font-size: 11px;
    color: var(--muted); margin-top: 6px;
  }

  /* Vibe Pills */
  .vibe-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .vibe-pill {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 14px;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.18s ease;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .vibe-pill:hover { border-color: rgba(255,255,255,0.15); }
  .vibe-pill.active {
    border-color: var(--border-glow);
    background: rgba(139,92,246,0.1);
    box-shadow: 0 0 0 1px rgba(139,92,246,0.2);
  }
  .vibe-pill input[type="checkbox"] { display: none; }

  .vibe-icon { font-size: 18px; }
  .vibe-info { flex: 1; }
  .vibe-name {
    font-size: 13px; font-weight: 600; color: var(--text);
    display: block;
  }
  .vibe-desc { font-size: 11px; color: var(--muted); }

  .vibe-check {
    width: 18px; height: 18px;
    border: 1.5px solid var(--border);
    border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .vibe-pill.active .vibe-check {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  /* Generate button */
  .btn-generate {
    width: 100%;
    padding: 18px;
    background: linear-gradient(135deg, #7C3AED, #8B5CF6, #6D28D9);
    border: none;
    border-radius: 14px;
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-size: 16px; font-weight: 700;
    letter-spacing: 0.03em;
    cursor: pointer;
    position: relative; overflow: hidden;
    transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
    box-shadow: 0 4px 24px rgba(139,92,246,0.35);
    margin-bottom: 16px;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-generate:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 32px rgba(139,92,246,0.45);
  }
  .btn-generate:active { transform: translateY(0); }
  .btn-generate:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  .btn-generate::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, transparent 0%, rgba(255,255,255,0.08) 50%, transparent 100%);
  }

  .btn-text { position: relative; z-index: 1; display: flex; align-items: center; justify-content: center; gap: 10px; }

  /* Loading dots */
  .dots { display: inline-flex; gap: 4px; }
  .dots span {
    width: 5px; height: 5px;
    background: #fff; border-radius: 50%;
    animation: bounce 1s ease infinite;
  }
  .dots span:nth-child(2) { animation-delay: 0.15s; }
  .dots span:nth-child(3) { animation-delay: 0.3s; }

  /* Output */
  .output-section {
    display: none;
    animation: fadeUp 0.4s ease both;
  }
  .output-section.visible { display: block; }

  .output-header {
    font-family: 'Syne', sans-serif;
    font-size: 18px; font-weight: 700;
    margin-bottom: 14px;
    display: flex; align-items: center; gap: 10px;
  }
  .output-header .sparkle { color: var(--accent2); }

  .hook-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 12px;
    position: relative;
    transition: border-color 0.2s;
    animation: hookIn 0.35s ease both;
  }
  .hook-card:nth-child(2) { animation-delay: 0.1s; }
  .hook-card:nth-child(3) { animation-delay: 0.2s; }
  .hook-card:hover { border-color: rgba(255,255,255,0.12); }

  .hook-type {
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.12em; text-transform: uppercase;
    margin-bottom: 10px; display: flex; align-items: center; gap: 6px;
  }
  .hook-type .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .type-scroll .dot { background: var(--accent); }
  .type-question .dot { background: var(--accent2); }
  .type-contrast .dot { background: var(--accent3); }
  .type-scroll { color: var(--neon); }
  .type-question { color: var(--accent2); }
  .type-contrast { color: var(--accent3); }

  .hook-text {
    font-size: 15px; line-height: 1.6;
    color: var(--text); font-weight: 400;
    padding-right: 40px;
  }

  .copy-btn {
    position: absolute; top: 16px; right: 16px;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 11px; font-weight: 600;
    color: var(--muted); cursor: pointer;
    transition: all 0.18s;
    -webkit-tap-highlight-color: transparent;
  }
  .copy-btn:hover { background: rgba(255,255,255,0.1); color: var(--text); }
  .copy-btn.copied {
    background: rgba(6,214,160,0.12);
    border-color: rgba(6,214,160,0.3);
    color: var(--accent2);
  }

  .regen-row {
    display: flex; gap: 10px; margin-top: 4px;
  }
  .btn-regen {
    flex: 1; padding: 13px;
    background: transparent;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 600;
    cursor: pointer;
    transition: all 0.18s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-regen:hover { border-color: rgba(255,255,255,0.18); color: var(--text); }

  /* Animations */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-6px); }
  }
  @keyframes hookIn {
    from { opacity: 0; transform: translateX(-8px); }
    to { opacity: 1; transform: translateX(0); }
  }

  /* Toast */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 100px; padding: 10px 20px;
    font-size: 13px; color: var(--accent2);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    opacity: 0; transition: opacity 0.3s;
    white-space: nowrap; z-index: 100;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }

  @media (max-width: 400px) {
    .vibe-grid { grid-template-columns: 1fr; }
    .container { padding: 24px 16px 50px; }
  }
</style>
</head>

<div class="container">

// Vibe modifiers
const VIBE_PREFIXES = {
  professional: ["Here's what most people miss:", "The strategy behind this:", "Unpopular opinion for the boardroom:"],
  controversial: ["Let's be real —", "Nobody asked but here it is:", "I will die on this hill:"],
  humorous: ["Nobody's business but here we are:", "Sending this to my therapist first:", "My Roman Empire, actually:"],
  vulnerable: ["I almost didn't post this, but:", "This took more courage than it looks:", "Showing up anyway:"]
};

// ─── Logic ────────────────────────────────────────────────────────────────────

function updateChar() {
  const val = document.getElementById('photoDesc').value.length;
  document.getElementById('charCount').textContent = val;
}

function togglePill(checkbox) {
  const pill = checkbox.closest('.vibe-pill');
  pill.classList.toggle('active', checkbox.checked);
}

function getActiveVibes() {
  return Array.from(document.querySelectorAll('.vibe-pill input:checked')).map(c => c.value);
}

function detectKeyword(text) {
  const t = text.toLowerCase();
  const keywords = ['coffee', 'gym', 'beach', 'travel', 'food', 'sunset', 'work'];
  for (const kw of keywords) {
    if (t.includes(kw)) return kw;
  }
  // secondary
  const extras = { morning: 'coffee', workout: 'gym', fitness: 'gym', ocean: 'beach', sea: 'beach', eat: 'food', restaurant: 'food', dinner: 'food', sky: 'sunset', golden: 'sunset', office: 'work', project: 'work' };
  for (const [alias, kw] of Object.entries(extras)) {
    if (t.includes(alias)) return kw;
  }
  return 'default';
}

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function buildHook(base, vibes) {
  if (!vibes.length) return base;
  // Apply one vibe prefix if active
  const vibe = pick(vibes);
  const prefix = pick(VIBE_PREFIXES[vibe]);
  return prefix + ' ' + base.charAt(0).toLowerCase() + base.slice(1);
}

async function generateHooks() {
  const desc = document.getElementById('photoDesc').value.trim();
  if (!desc) {
    document.getElementById('photoDesc').focus();
    document.getElementById('photoDesc').style.borderColor = 'rgba(255,100,100,0.5)';
    setTimeout(() => document.getElementById('photoDesc').style.borderColor = '', 1500);
    return;
  }

  const btn = document.getElementById('generateBtn');
  const btnText = document.getElementById('btnText');
  btn.disabled = true;
  btnText.innerHTML = `<span>Analyzing the Vibe</span><span class="dots"><span></span><span></span><span></span></span>`;

  const vibes = getActiveVibes();
  const keyword = detectKeyword(desc);
  const hooks = HOOK_DB[keyword] || HOOK_DB.default;

  await new Promise(r => setTimeout(r, 1400));

  document.getElementById('hook1').textContent = buildHook(pick(hooks.scroll), vibes);
  document.getElementById('hook2').textContent = buildHook(pick(hooks.question), vibes);
  document.getElementById('hook3').textContent = buildHook(pick(hooks.contrast), vibes);

  // Reset copy buttons
  document.querySelectorAll('.copy-btn').forEach(b => { b.textContent = 'Copy'; b.classList.remove('copied'); });

  const output = document.getElementById('outputSection');
  output.classList.remove('visible');
  void output.offsetWidth; // reflow for animation
  output.classList.add('visible');

  btn.disabled = false;
  btnText.innerHTML = '⏺ Generate My Hooks';

  setTimeout(() => {
    document.getElementById('outputSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 100);
}

function copyHook(btn, hookId) {
  const text = document.getElementById(hookId).textContent;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    showToast();
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2500);
  });
}

function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// Enter key shortcut
document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') generateHooks();
});
</script>
